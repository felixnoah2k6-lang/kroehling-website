<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script></head>
<body>
  <div class="label-eyebrow">Leistungs-Kachel</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
    <div style="background:#fff;border:1px solid var(--border-soft);border-radius:14px;padding:18px">
      <i data-lucide="syringe" style="width:32px;height:32px;color:var(--sage-700);stroke-width:1.5"></i>
      <div style="font-family:var(--font-serif);font-weight:600;font-size:17px;margin-top:14px">Impfungen</div>
      <div style="font-family:var(--font-sans);font-size:13px;color:var(--ink-500);margin-top:4px;line-height:1.5">Mit Impfausweis und Anamnesebogen.</div>
    </div>
    <div style="background:#fff;border:1px solid var(--border-soft);border-radius:14px;padding:18px">
      <i data-lucide="activity" style="width:32px;height:32px;color:var(--sage-700);stroke-width:1.5"></i>
      <div style="font-family:var(--font-serif);font-weight:600;font-size:17px;margin-top:14px">Sonographie</div>
      <div style="font-family:var(--font-sans);font-size:13px;color:var(--ink-500);margin-top:4px;line-height:1.5">DEGUM-zertifiziert.</div>
    </div>
    <div style="background:#fff;border:1px solid var(--border-soft);border-radius:14px;padding:18px">
      <i data-lucide="heart-pulse" style="width:32px;height:32px;color:var(--sage-700);stroke-width:1.5"></i>
      <div style="font-family:var(--font-serif);font-weight:600;font-size:17px;margin-top:14px">Notfallmedizin</div>
      <div style="font-family:var(--font-sans);font-size:13px;color:var(--ink-500);margin-top:4px;line-height:1.5">Schnelle Hilfe vor Ort.</div>
    </div>
  </div>
</body>
<script>lucide.createIcons();</script>
</html>
