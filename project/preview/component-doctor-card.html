<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="label-eyebrow">Arzt-Karte</div>
  <div style="background:#fff;border:1px solid var(--border-soft);border-radius:18px;overflow:hidden;box-shadow:0 2px 6px rgba(60,50,30,0.07);width:300px">
    <div style="aspect-ratio:4/5;background:url('../assets/dr-glossner.png') center/cover;background-color:var(--sage-100)"></div>
    <div style="padding:18px 20px 20px">
      <div style="font-family:var(--font-serif);font-size:20px;font-weight:600;line-height:1.2">Dr. med. Sebastian Gloßner</div>
      <div style="font-family:var(--font-sans);font-size:14px;color:var(--ink-500);margin-top:4px">Facharzt für Allgemeinmedizin</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:14px">
        <span style="font-size:12px;background:var(--sage-50);color:var(--sage-700);padding:4px 10px;border-radius:999px;font-weight:600">Notfallmedizin</span>
        <span style="font-size:12px;background:var(--sage-50);color:var(--sage-700);padding:4px 10px;border-radius:999px;font-weight:600">DEGUM Sonographie</span>
      </div>
    </div>
  </div>
</body></html>
