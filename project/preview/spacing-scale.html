<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="label-eyebrow">Spacing · 8px Base</div>
  <div style="display:flex;flex-direction:column;gap:8px;font-family:var(--font-sans);font-size:13px;color:var(--ink-700)">
    <div style="display:flex;align-items:center;gap:14px"><div style="width:4px;height:14px;background:var(--sage-500);border-radius:2px"></div><span style="width:60px">space-1</span><span style="color:var(--ink-500)">4px · inline gaps</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:8px;height:14px;background:var(--sage-500);border-radius:2px"></div><span style="width:60px">space-2</span><span style="color:var(--ink-500)">8px · icon ↔ label</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:16px;height:14px;background:var(--sage-500);border-radius:2px"></div><span style="width:60px">space-4</span><span style="color:var(--ink-500)">16px · paragraph rhythm</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:32px;height:14px;background:var(--sage-500);border-radius:2px"></div><span style="width:60px">space-6</span><span style="color:var(--ink-500)">32px · card padding</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:64px;height:14px;background:var(--sage-500);border-radius:2px"></div><span style="width:60px">space-8</span><span style="color:var(--ink-500)">64px · between sections (mobile)</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:96px;height:14px;background:var(--sage-500);border-radius:2px"></div><span style="width:60px">space-9</span><span style="color:var(--ink-500)">96px · between sections (desktop)</span></div>
  </div>
</body></html>
