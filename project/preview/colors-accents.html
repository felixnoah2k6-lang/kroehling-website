<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="label-eyebrow">Logo Accents</div>
  <div class="row" style="gap:18px;align-items:center">
    <div style="display:flex;gap:14px;align-items:center">
      <div style="width:64px;height:64px;border-radius:999px;background:#f0a020"></div>
      <div>
        <div style="font-family:var(--font-sans);font-weight:600;font-size:14px">Orange</div>
        <div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-500)">#F0A020</div>
        <div style="font-family:var(--font-sans);font-size:11px;color:var(--ink-500);margin-top:4px;max-width:140px">Notdienst strip · emergency only</div>
      </div>
    </div>
    <div style="display:flex;gap:14px;align-items:center">
      <div style="width:64px;height:64px;border-radius:999px;background:#94a8e8"></div>
      <div>
        <div style="font-family:var(--font-sans);font-weight:600;font-size:14px">Blue</div>
        <div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-500)">#94A8E8</div>
        <div style="font-family:var(--font-sans);font-size:11px;color:var(--ink-500);margin-top:4px;max-width:140px">Logo only — not in UI</div>
      </div>
    </div>
    <div style="display:flex;gap:14px;align-items:center">
      <div style="width:64px;height:64px;border-radius:999px;background:#1ea876;display:flex;align-items:center;justify-content:center;color:#fff;font-size:32px;font-weight:300">+</div>
      <div>
        <div style="font-family:var(--font-sans);font-weight:600;font-size:14px">Mark Green</div>
        <div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-500)">#1EA876</div>
        <div style="font-family:var(--font-sans);font-size:11px;color:var(--ink-500);margin-top:4px;max-width:140px">Medical cross · logo</div>
      </div>
    </div>
  </div>
</body></html>
