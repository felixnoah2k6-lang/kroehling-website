<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  .icon-tile { display:flex; flex-direction:column; align-items:center; gap:6px; padding:10px 6px; border-radius:10px; background:#fff; border:1px solid var(--border-soft); }
  .icon-tile svg { width:24px; height:24px; stroke-width:1.75; color:var(--sage-700); }
  .icon-tile span { font-family:var(--font-sans); font-size:11px; color:var(--ink-500); }
</style>
</head>
<body>
  <div class="label-eyebrow">Iconography · Lucide · stroke 1.75</div>
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:8px">
    <div class="icon-tile"><i data-lucide="phone"></i><span>phone</span></div>
    <div class="icon-tile"><i data-lucide="phone-call"></i><span>phone-call</span></div>
    <div class="icon-tile"><i data-lucide="clock"></i><span>clock</span></div>
    <div class="icon-tile"><i data-lucide="map-pin"></i><span>map-pin</span></div>
    <div class="icon-tile"><i data-lucide="calendar-days"></i><span>calendar</span></div>
    <div class="icon-tile"><i data-lucide="syringe"></i><span>syringe</span></div>
    <div class="icon-tile"><i data-lucide="stethoscope"></i><span>stethoscope</span></div>
    <div class="icon-tile"><i data-lucide="heart-pulse"></i><span>heart-pulse</span></div>
    <div class="icon-tile"><i data-lucide="activity"></i><span>activity</span></div>
    <div class="icon-tile"><i data-lucide="accessibility"></i><span>accessibility</span></div>
    <div class="icon-tile"><i data-lucide="file-text"></i><span>file-text</span></div>
    <div class="icon-tile"><i data-lucide="mail"></i><span>mail</span></div>
    <div class="icon-tile"><i data-lucide="printer"></i><span>printer</span></div>
    <div class="icon-tile"><i data-lucide="arrow-right"></i><span>arrow-right</span></div>
    <div class="icon-tile"><i data-lucide="menu"></i><span>menu</span></div>
    <div class="icon-tile"><i data-lucide="chevron-down"></i><span>chevron</span></div>
  </div>
</body>
<script>lucide.createIcons();</script>
</html>
