<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script></head>
<body>
  <div class="label-eyebrow">Sprechzeiten Card</div>
  <div style="background:#fff;border:1px solid var(--border-soft);border-radius:16px;padding:22px;box-shadow:0 2px 6px rgba(60,50,30,0.07);max-width:420px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <i data-lucide="clock" style="width:20px;height:20px;color:var(--sage-700);stroke-width:1.75"></i>
      <div style="font-family:var(--font-serif);font-size:20px;font-weight:600">Sprechzeiten Pielenhofen</div>
    </div>
    <table style="width:100%;border-collapse:collapse;font-family:var(--font-sans);font-size:15px">
      <tr style="color:var(--ink-700)"><td style="padding:6px 0">Mo – Do</td><td style="text-align:right;font-variant-numeric:tabular-nums">07:30 – 12:00 · 15:00 – 18:00</td></tr>
      <tr style="color:var(--ink-700);border-top:1px solid var(--divider)"><td style="padding:6px 0">Fr</td><td style="text-align:right;font-variant-numeric:tabular-nums">07:30 – 12:00</td></tr>
      <tr style="color:var(--ink-400);border-top:1px solid var(--divider)"><td style="padding:6px 0">Sa · So</td><td style="text-align:right">geschlossen</td></tr>
    </table>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--divider);display:flex;align-items:center;gap:8px;color:var(--sage-700);font-family:var(--font-sans);font-weight:600;font-size:14px">
      <span style="width:8px;height:8px;border-radius:999px;background:var(--sage-500)"></span>
      Jetzt geöffnet
    </div>
  </div>
</body>
<script>lucide.createIcons();</script>
</html>
