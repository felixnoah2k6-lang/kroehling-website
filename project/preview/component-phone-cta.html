<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script></head>
<body>
  <div class="label-eyebrow">Phone CTA Block</div>
  <div style="background:var(--sage-700);color:var(--cream-50);border-radius:18px;padding:24px;display:flex;align-items:center;gap:24px;box-shadow:0 24px 48px -20px rgba(60,50,30,0.22)">
    <div style="width:64px;height:64px;border-radius:999px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center">
      <i data-lucide="phone-call" style="width:28px;height:28px;stroke-width:1.75"></i>
    </div>
    <div style="flex:1">
      <div style="font-family:var(--font-sans);font-size:13px;text-transform:uppercase;letter-spacing:0.16em;opacity:0.7;margin-bottom:4px">Telefonisch erreichbar</div>
      <div style="font-family:var(--font-serif);font-size:32px;font-weight:600;letter-spacing:-0.01em">09409 / 86290</div>
      <div style="font-size:14px;opacity:0.8;margin-top:2px">Mo–Do 07:30 – 18:00 · Fr 07:30 – 12:00</div>
    </div>
    <button style="background:#faf7f1;color:#2a2620;border:none;padding:14px 22px;border-radius:999px;font-family:var(--font-sans);font-weight:600;font-size:16px;display:inline-flex;align-items:center;gap:10px;cursor:pointer">
      <i data-lucide="phone" style="width:18px;height:18px;stroke-width:1.75"></i>Jetzt anrufen
    </button>
  </div>
</body>
<script>lucide.createIcons();</script>
</html>
